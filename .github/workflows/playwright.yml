name: Playwright Tests
on:
  push:
    branches: [main, master, feat/ci-cd]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install -g pnpm && pnpm install
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Build and deploy to Zephyr
        env:
          ZEPHYR_TOKEN: ${{ secrets.ZEPHYR_TOKEN }}
        run: pnpm build
      - name: Read deploy URL
        id: deploy-url
        run: echo "url=$(cat deploy-url.txt)" >> $GITHUB_OUTPUT
      - name: Run Playwright tests
        env:
          DEPLOY_URL: ${{ steps.deploy-url.outputs.url }}
          ZE_SECRET_TOKEN: ${{ secrets.ZEPHYR_AUTH_TOKEN }}
        run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
